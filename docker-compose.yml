version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5170:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=MeTenTenDB;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
    depends_on:
      - db

  blazor:
    build:
      context: .
      dockerfile: Dockerfile.blazor
    ports:
      - "5283:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - api

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
